plugins {
    id 'java-library'
    id 'java'
}

task sourceJar(type: Jar) {
    archiveClassifier = 'sources'
    from sourceSets.main.allJava
}

repositories {
    mavenCentral()
}

// Add your group and version here
group = 'io.github.ppissias.jtransient'
version = '1.0.0'

tasks.withType(JavaCompile) {
    options.encoding = 'UTF-8'
}

/*test {
    testLogging {
        // This forces Gradle to print standard out and error to the console
        showStandardStreams = true

        // Optional: Gives you more detail on exactly which test is running
        events "passed", "skipped", "failed"
        exceptionFormat "full"
    }
